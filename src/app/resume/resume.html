<div class="resume" [ngClass]="{highlight:flag}">
  <div class="top">
    <div class="card">
      <h2>{{fullname}}</h2>
      <p><b>Phone:</b> {{ phone }}</p>
      <p><b>City:</b> {{ city }}</p>
      <p><b>Email:</b> {{ email }}</p>
      <p><b>About me:</b> {{ aboutMe }}</p>
    </div>
    <div class="picG">
      <img src="gumball.jpg" [ngStyle]="{
        'border-radius': '10px',
        'box-shadow': flag ? '0 0 20px rgba(255,255,255,0.5)' : 'none'}">
    </div>
  </div>
  <app-exper [flag]="flag"></app-exper>
  <app-links></app-links>
  <div id="but">
    <button (click)="flag = !flag">Change</button>
  </div>

</div>
